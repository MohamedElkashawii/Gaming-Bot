<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gaming Community Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 460px;
    }

    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .header .icon { font-size: 40px; margin-bottom: 10px; }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: #888;
    }

    .type-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .type-btn {
      padding: 10px 4px;
      border-radius: 10px;
      border: 1.5px solid #2e2e3e;
      background: #12121a;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      transition: all 0.15s;
      text-align: center;
    }

    .type-btn:hover { border-color: #5865F2; color: #fff; }
    .type-btn.active { border-color: #5865F2; background: #1e1f3a; color: #fff; }

    label {
      font-size: 13px;
      color: #888;
      display: block;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: #12121a;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
      margin-bottom: 1rem;
    }

    input:focus, textarea:focus { border-color: #5865F2; }
    textarea { resize: vertical; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #5865F2;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover { background: #4752c4; }
    .submit-btn:disabled { background: #333; cursor: not-allowed; color: #666; }

    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }

    .success { color: #57f287; }
    .error   { color: #ed4245; }

    .footer {
      font-size: 12px;
      color: #555;
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">🎮</div>
      <h1>Gaming Community Bot</h1>
      <p>Report a bug, find a team, or ask for help</p>
    </div>

    <div class="type-buttons">
      <button class="type-btn" onclick="selectType('bug-report', this)">🐛 Bug Report</button>
      <button class="type-btn" onclick="selectType('team-finder', this)">👥 Find Team</button>
      <button class="type-btn" onclick="selectType('game-help', this)">💡 Game Help</button>
    </div>

    <label>Your Discord username</label>
    <input type="text" id="username" placeholder="e.g. PlayerOne#1234" />

    <label>Your message</label>
    <textarea id="message" rows="4" placeholder="Describe your bug, request, or question..."></textarea>

    <button class="submit-btn" onclick="sendMessage()">Send to Discord Bot</button>

    <div id="status"></div>
    <p class="footer">Messages are automatically routed to the right channel</p>
  </div>

  <script>
    const WEBHOOK_URL = 'https://elkashawi.app.n8n.cloud/webhook/d0cdd428-be96-4821-85bc-65342cf928d0';
    let selectedType = null;

    function selectType(type, el) {
      selectedType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    async function sendMessage() {
      const username = document.getElementById('username').value.trim();
      const message  = document.getElementById('message').value.trim();
      const status   = document.getElementById('status');

      if (!message) {
        status.className = 'error';
        status.textContent = 'Please enter a message.';
        return;
      }

      const btn = document.querySelector('.submit-btn');
      btn.textContent = 'Sending...';
      btn.disabled = true;
      status.textContent = '';

      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            username: username || 'Anonymous',
            type: selectedType || 'unspecified'
          })
        });
        status.className = 'success';
        status.textContent = 'Sent! Check your Discord channel.';
        document.getElementById('message').value = '';
        document.getElementById('username').value = '';
        selectedType = null;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      } catch (e) {
        status.className = 'error';
        status.textContent = 'Something went wrong. Please try again.';
      }

      btn.textContent = 'Send to Discord Bot';
      btn.disabled = false;
    }
  </script>
</body>
</html>
